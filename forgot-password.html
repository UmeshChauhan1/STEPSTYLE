<html lang="en">

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Forgot Password — StepStyle</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .auth-container { max-width: 400px; margin: 6rem auto; padding: 2rem; background: var(--gray); border-radius: 12px; border: 1px solid var(--gray-mid); }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: .5rem; font-weight: 500; }
    .form-group input { width: 100%; padding: .75rem 1rem; border: 1px solid var(--gray-mid); border-radius: 8px; background: var(--gray-mid); color: var(--white); font-size: .9rem; }
    .form-group input:focus { outline: none; border-color: var(--green); }
    .submit-btn { width: 100%; padding: .85rem; background: var(--green); color: var(--black); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .submit-btn:hover { background: #2dd657; }
    .error { color: #ff4d4d; font-size: .85rem; margin-top: .25rem; }
    .success { color: var(--green); font-size: .85rem; margin-top: .25rem; }
    .auth-link { text-align: center; margin-top: 1rem; }
    .auth-link a { color: var(--green); text-decoration: none; }
    .loading { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="index.html">STEP<span>STYLE</span></a>
  <ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li></ul>
  <div class="nav-icons"><button class="hamburger" id="hamburger"><span></span><span></span><span></span></button></div>
</nav>
<ul class="mobile-nav" id="mobileNav"><li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li></ul>

<div class="page">
  <div class="auth-container">
    <h1 style="text-align:center;margin-bottom:2rem">Forgot Password</h1>
    
    <form id="forgotForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required placeholder="your@email.com"/>
        <div class="error" id="emailError"></div>
      </div>
      
      <div class="error" id="generalError" style="margin-bottom:1rem"></div>
      <div class="success" id="successMsg" style="margin-bottom:1rem"></div>
      
      <button type="submit" class="submit-btn">Send Reset Link</button>
    </form>
    
    <div class="auth-link">
      Remember your password? <a href="login.html">Sign In</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/core.js"></script>
<script>
  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const btn = document.querySelector('.submit-btn');
    
    document.getElementById('emailError').textContent = '';
    document.getElementById('generalError').textContent = '';
    document.getElementById('successMsg').textContent = '';
    
    try {
      btn.classList.add('loading');
      btn.textContent = 'Sending...';
      
      await APIs.auth.forgotPassword(email);
      
      document.getElementById('successMsg').textContent = '✓ Password reset link sent! Check your email.';
      document.getElementById('email').value = '';
      
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 3000);
      
    } catch (err) {
      document.getElementById('generalError').textContent = err.message || 'Failed to send reset link';
      btn.classList.remove('loading');
      btn.textContent = 'Send Reset Link';
    }
  });
</script>
</body>
</html>
