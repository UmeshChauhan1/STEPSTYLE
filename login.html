<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — StepStyle</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .login-container {
      max-width: 400px;
      margin: 4rem auto;
      padding: 2rem;
      background: var(--gray);
      border-radius: 12px;
      border: 1px solid var(--gray-mid);
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: .5rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: .75rem 1rem;
      border: 1px solid var(--gray-mid);
      border-radius: 8px;
      background: var(--gray-mid);
      color: var(--white);
      font-size: .9rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--green);
    }
    .login-btn {
      width: 100%;
      padding: .85rem;
      background: var(--green);
      color: var(--black);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: .9rem;
    }
    .login-btn:hover {
      background: #2dd657;
    }
    .error { color: #ff4d4d; font-size: .85rem; margin-top: .25rem; }
    .auth-link { text-align: center; margin-top: 1.5rem; }
    .auth-link a {
      color: var(--green);
      text-decoration: none;
    }
    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="login-container">
    <h1 style="text-align:center;margin-bottom:2rem">StepStyle Login</h1>
    
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="your@email.com"/>
        <div class="error" id="emailError"></div>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••"/>
        <div class="error" id="passwordError"></div>
      </div>
      
      <div class="error" id="generalError" style="margin-bottom:1rem"></div>
      
      <button type="submit" class="login-btn">Sign In</button>
    </form>
    
    <div style="text-align:center;margin-top:1rem">
      <a href="forgot-password.html" style="color:var(--gray-light);text-decoration:none;font-size:.9rem">Forgot password?</a>
    </div>
    
    <div class="auth-link">
      Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  // Check if already logged in
  if (window.checkAuth()) {
    window.location.href = 'index.html';
  }
  
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.querySelector('.login-btn');
    
    try {
      btn.classList.add('loading');
      btn.textContent = 'Signing in...';
      
      const data = await APIs.auth.login(email, password);
      
      showToast('Login successful!', 'success');
      
      // Redirect to original page or home
      const redirect = localStorage.getItem('ss_redirect') || 'index.html';
      localStorage.removeItem('ss_redirect');
      setTimeout(() => {
        window.location.href = redirect;
      }, 500);
      
    } catch (err) {
      document.getElementById('generalError').textContent = err.message || 'Login failed';
      btn.classList.remove('loading');
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
