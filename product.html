<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Product — StepStyle</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-XXXXXXXXXX');</script>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a class="logo" href="index.html">STEP<span>STYLE</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-icons">
    <button class="nav-icon-btn" id="cartToggle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span class="cart-badge">0</span>
    </button>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>
<ul class="mobile-nav" id="mobileNav">
  <li><a href="index.html">Home</a></li>
  <li><a href="shop.html">Shop</a></li>
  <li><a href="contact.html">Contact</a></li>
</ul>

<div class="page">
  <div style="padding:1.5rem 5% .5rem">
    <a href="shop.html" style="font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-light);display:inline-flex;align-items:center;gap:.4rem;transition:color .2s" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--gray-light)'">
      ← Back to Shop
    </a>
  </div>
  <div class="detail-grid" id="detailContent">
    <div style="text-align:center;padding:4rem;color:var(--gray-light)">Loading…</div>
  </div>

  <!-- Related Products -->
  <section class="section" style="background:var(--gray);padding-top:3rem">
    <div class="section-header"><div><p class="section-label">Also Like</p><h2 class="section-title">Related Products</h2></div></div>
    <div class="product-grid" id="relatedGrid"></div>
  </section>
</div>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header"><h2>Your Cart</h2><button class="close-btn" id="cartClose">&times;</button></div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter"></div>
</div>

<footer>
  <div class="footer-logo">STEP<span>STYLE</span></div>
  <ul class="footer-links"><li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li><li><a href="contact.html">Contact</a></li></ul>
  <p class="footer-copy">&copy; 2025 StepStyle.</p>
</footer>

<script src="js/core.js"></script>
<script src="js/cart-ui.js"></script>
<script>
  const id = new URLSearchParams(location.search).get('id');
  const p = Products.byId(id);

  if (!p) {
    document.getElementById('detailContent').innerHTML = '<div style="padding:4rem 5%;text-align:center;color:var(--gray-light)">Product not found. <a href="shop.html" style="color:var(--green)">Back to shop</a></div>';
  } else {
    document.title = p.name + ' — StepStyle';
    ga('view_item', { currency:'USD', value:p.price, items:[{item_id:p.id, item_name:p.name, item_category:p.category, price:p.price}] });

    document.getElementById('detailContent').innerHTML = `
      <div class="detail-img" style="background:${p.color||'var(--gray-mid)'}">
        <span style="font-size:9rem">${p.emoji}</span>
      </div>
      <div>
        ${p.badge ? `<p class="section-label" style="margin-bottom:.4rem">${p.badge}</p>` : ''}
        <h1 class="detail-name">${p.name}</h1>
        <p class="detail-price">$${p.price}</p>
        <p class="detail-desc">${p.desc}</p>
        <div class="detail-meta">
          <span><strong>Category:</strong> ${p.category}</span>
          <span><strong>Stock:</strong> ${p.stock > 0 ? p.stock + ' pairs available' : '<span style="color:#ff4d4d">Out of stock</span>'}</span>
          <span><strong>SKU:</strong> ${p.id.toUpperCase()}</span>
        </div>
        <div style="display:flex;gap:1rem;flex-wrap:wrap">
          <button class="btn btn-green" id="addBtn" onclick="addDetail()" ${p.stock===0?'disabled style="opacity:.4"':''}>
            + Add to Cart
          </button>
          <a href="checkout.html" class="btn btn-outline">Buy Now</a>
        </div>
      </div>`;

    // Related products
    const related = Products.all().filter(x => x.id !== p.id && x.category === p.category).slice(0,3);
    const rGrid = document.getElementById('relatedGrid');
    (related.length ? related : Products.all().filter(x=>x.id!==p.id).slice(0,3)).forEach(rp => {
      const el = document.createElement('div');
      el.className = 'product-card';
      el.innerHTML = buildProductCard(rp);
      el.querySelector('.card-img').addEventListener('click', () => location.href = 'product.html?id=' + rp.id);
      rGrid.appendChild(el);
    });
  }

  function addDetail() {
    Cart.add(p);
    const btn = document.getElementById('addBtn');
    btn.textContent = '✓ Added to Cart';
    btn.classList.add('added');
    showToast(p.name + ' added to cart');
    renderCart();
    setTimeout(() => { btn.textContent = '+ Add to Cart'; btn.classList.remove('added'); }, 2000);
  }
</script>
</body>
</html>
