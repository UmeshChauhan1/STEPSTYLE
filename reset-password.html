<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password — StepStyle</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .auth-container { max-width: 400px; margin: 6rem auto; padding: 2rem; background: var(--gray); border-radius: 12px; border: 1px solid var(--gray-mid); }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: .5rem; font-weight: 500; }
    .form-group input { width: 100%; padding: .75rem 1rem; border: 1px solid var(--gray-mid); border-radius: 8px; background: var(--gray-mid); color: var(--white); font-size: .9rem; }
    .form-group input:focus { outline: none; border-color: var(--green); }
    .submit-btn { width: 100%; padding: .85rem; background: var(--green); color: var(--black); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .submit-btn:hover { background: #2dd657; }
    .error { color: #ff4d4d; font-size: .85rem; margin-top: .25rem; }
    .success { color: var(--green); font-size: .85rem; margin-top: .25rem; }
    .auth-link { text-align: center; margin-top: 1rem; }
    .auth-link a { color: var(--green); text-decoration: none; }
    .password-strength { font-size: .75rem; margin-top: .25rem; padding: .5rem; border-radius: 4px; background: var(--gray-mid); }
    .strength-weak { color: #ff4d4d; }
    .strength-medium { color: #ffaa00; }
    .strength-strong { color: #4dff4d; }
    .loading { opacity: 0.6; pointer-events: none; }
    .expired { color: #ff4d4d; text-align: center; }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="index.html">STEP<span>STYLE</span></a>
  <ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li></ul>
  <div class="nav-icons"><button class="hamburger" id="hamburger"><span></span><span></span><span></span></button></div>
</nav>
<ul class="mobile-nav" id="mobileNav"><li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li></ul>

<div class="page">
  <div class="auth-container">
    <h1 style="text-align:center;margin-bottom:2rem">Reset Password</h1>
    
    <div id="formContainer">
      <form id="resetForm">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="password" required placeholder="••••••••"/>
          <div id="strengthPW" class="password-strength"></div>
          <div class="error" id="passwordError"></div>
        </div>
        
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="passwordConfirm" required placeholder="••••••••"/>
          <div class="error" id="passwordConfirmError"></div>
        </div>
        
        <div class="error" id="generalError" style="margin-bottom:1rem"></div>
        
        <button type="submit" class="submit-btn">Reset Password</button>
      </form>
      
      <div class="auth-link">
        Remember your password? <a href="login.html">Sign In</a>
      </div>
    </div>
    
    <div id="expiredContainer" style="display:none">
      <p class="expired">This password reset link has expired or is invalid.</p>
      <p style="text-align:center;margin-top:1rem"><a href="forgot-password.html">Request a new reset link</a></p>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/core.js"></script>
<script>
  // Get token from URL
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  
  if (!token) {
    document.getElementById('formContainer').style.display = 'none';
    document.getElementById('expiredContainer').style.display = 'block';
  }
  
  // Password strength indicator
  document.getElementById('password').addEventListener('input', (e) => {
    const pwd = e.target.value;
    const strength = document.getElementById('strengthPW');
    
    if (!pwd) {
      strength.textContent = '';
      return;
    }
    
    let score = 0;
    if (pwd.length >= 8) score++;
    if (pwd.length >= 12) score++;
    if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^a-zA-Z0-9]/.test(pwd)) score++;
    
    let level = '';
    if (score <= 2) {
      level = '<span class="strength-weak">⚠ Weak password</span>';
    } else if (score <= 3) {
      level = '<span class="strength-medium">≈ Medium strength</span>';
    } else {
      level = '<span class="strength-strong">✓ Strong password</span>';
    }
    
    strength.innerHTML = level;
  });
  
  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('passwordConfirm').value;
    const btn = document.querySelector('.submit-btn');
    
    // Clear errors
    document.querySelectorAll('.error').forEach(el => el.textContent = '');
    
    // Validate
    if (password !== passwordConfirm) {
      document.getElementById('passwordConfirmError').textContent = 'Passwords do not match';
      return;
    }
    if (password.length < 8) {
      document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
      return;
    }
    
    try {
      btn.classList.add('loading');
      btn.textContent = 'Resetting...';
      
      await APIs.auth.resetPassword(token, password);
      
      showToast('Password reset successfully!', 'success');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
      
    } catch (err) {
      document.getElementById('generalError').textContent = err.message || 'Failed to reset password';
      btn.classList.remove('loading');
      btn.textContent = 'Reset Password';
    }
  });
</script>
</body>
</html>
