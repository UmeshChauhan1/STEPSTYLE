<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard — StepStyle Admin</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-XXXXXXXXXX');</script>
  <link rel="stylesheet" href="../css/admin.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div id="sidebarMount"></div>
<div class="admin-layout">
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:1rem">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <span class="topbar-title">Dashboard</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-time" id="topbarTime"></span>
        <a href="../index.html" style="font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:color .2s" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--muted)'">View Store →</a>
      </div>
    </div>
    <div class="admin-content">
      <!-- Stats -->
      <div class="stats-grid" id="statsGrid"></div>
      <!-- Chart + Recent Orders -->
      <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:1.5rem;margin-bottom:1.5rem" id="mainGrid">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Revenue (Last 7 Days)</span></div>
          <div class="chart-wrap"><canvas id="revenueChart"></canvas></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Orders by Status</span></div>
          <div class="chart-wrap" style="height:220px"><canvas id="statusChart"></canvas></div>
        </div>
      </div>
      <!-- Recent Orders -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Recent Orders</span>
          <a href="orders.html" class="btn-sm btn-secondary" style="text-decoration:none">View All</a>
        </div>
        <div style="overflow-x:auto">
          <table class="admin-table" id="recentOrders"></table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/core.js"></script>
<script src="sidebar.js"></script>
<script src="admin.js"></script>
<script>
  requireAuth();
  document.getElementById('sidebarMount').innerHTML = buildSidebar('dashboard');

  const orders = Orders.all();
  const products = Products.all();
  const revenue = Orders.totalRevenue();
  const pending = orders.filter(o=>o.status==='Pending').length;

  // Stats
  document.getElementById('statsGrid').innerHTML = [
    { label:'Total Revenue', value: fmt(revenue), sub:'All time', icon:'💰' },
    { label:'Total Orders', value: orders.length, sub: pending + ' pending', icon:'📦' },
    { label:'Products', value: products.length, sub:'In catalog', icon:'👟' },
    { label:'Customers', value: [...new Set(orders.map(o=>o.customer?.email||''))].filter(Boolean).length, sub:'Unique buyers', icon:'👥' },
  ].map(s=>`
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}</div>
      <div class="stat-sub">${s.sub}</div>
      <div class="stat-icon">${s.icon}</div>
    </div>`).join('');

  // Revenue Chart (last 7 days)
  const days = [];
  const dayRevenue = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const label = d.toLocaleDateString('en-US',{weekday:'short'});
    days.push(label);
    // Simulate or use real orders
    const rev = orders.filter(o => {
      const od = new Date(o.date);
      return od.toDateString() === d.toDateString();
    }).reduce((s,o)=>s+(o.total||0),0);
    dayRevenue.push(rev || Math.floor(Math.random()*400+100)); // fallback demo data
  }
  new Chart(document.getElementById('revenueChart'), {
    type:'line',
    data: {
      labels: days,
      datasets:[{ label:'Revenue', data: dayRevenue, borderColor:'#2dff6e', backgroundColor:'rgba(45,255,110,.08)', tension:.4, pointBackgroundColor:'#2dff6e', pointRadius:4, fill:true }]
    },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ x:{ grid:{color:'#1e1e1e'}, ticks:{color:'#666',font:{family:'DM Sans',size:11}} }, y:{ grid:{color:'#1e1e1e'}, ticks:{color:'#666',font:{family:'DM Sans',size:11}, callback:v=>'$'+v} } } }
  });

  // Status chart
  const statusCounts = { Pending:0, Shipped:0, Delivered:0, Cancelled:0 };
  orders.forEach(o => { if(statusCounts[o.status]!==undefined) statusCounts[o.status]++; });
  new Chart(document.getElementById('statusChart'), {
    type:'doughnut',
    data:{
      labels: Object.keys(statusCounts),
      datasets:[{ data: Object.values(statusCounts), backgroundColor:['#ff9a3c','#3ca9ff','#2dff6e','#ff4d4d'], borderWidth:0 }]
    },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ color:'#777', font:{family:'DM Sans',size:11}, padding:16 } } } }
  });

  // Recent orders table
  const recent = orders.slice(0,8);
  document.getElementById('recentOrders').innerHTML = `
    <thead><tr><th>Order ID</th><th>Customer</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th></tr></thead>
    <tbody>${recent.length ? recent.map(o=>`
      <tr>
        <td style="font-family:'Bebas Neue';font-size:.9rem;color:var(--green)">#${o.id}</td>
        <td>${o.customer?.name||'—'}<br><span style="font-size:.72rem;color:var(--muted)">${o.customer?.email||''}</span></td>
        <td style="color:var(--muted);font-size:.8rem">${fmtDate(o.date)}</td>
        <td style="font-size:.8rem">${o.items?.length||0} item(s)</td>
        <td style="color:var(--green)">${fmt(o.total)}</td>
        <td>${statusBadge(o.status)}</td>
      </tr>`).join('') : `<tr><td colspan="6" class="empty-state">No orders yet. <a href="../shop.html" style="color:var(--green)">Place a test order</a></td></tr>`}
    </tbody>`;

  // Adjust main grid on small screens
  if (window.innerWidth < 900) {
    document.getElementById('mainGrid').style.gridTemplateColumns = '1fr';
  }
</script>
</body>
</html>
