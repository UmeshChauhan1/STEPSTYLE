<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Customers — StepStyle Admin</title>
  <link rel="stylesheet" href="../css/admin.css"/>
</head>
<body>
<div id="sidebarMount"></div>
<div class="admin-layout">
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:1rem">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <span class="topbar-title">Customers</span>
      </div>
      <div class="topbar-right"><span class="topbar-time" id="topbarTime"></span></div>
    </div>
    <div class="admin-content">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Customer List</span>
          <div class="panel-actions">
            <input type="text" class="admin-search" id="searchInput" placeholder="Search customers…" oninput="renderCustomers()"/>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Total Orders</th><th>Total Spent</th><th>Last Order</th><th>Actions</th></tr></thead>
            <tbody id="customersTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CUSTOMER DETAIL MODAL -->
<div class="modal-overlay" id="custModal">
  <div class="modal" style="width:560px">
    <div class="modal-header"><h3>Customer Details</h3><button class="modal-close" onclick="document.getElementById('custModal').classList.remove('open')">&times;</button></div>
    <div class="modal-body" id="custModalBody"></div>
    <div class="modal-footer"><button class="btn-sm btn-secondary" onclick="document.getElementById('custModal').classList.remove('open')">Close</button></div>
  </div>
</div>

<script src="../js/core.js"></script>
<script src="sidebar.js"></script>
<script src="admin.js"></script>
<script>
  requireAuth();
  document.getElementById('sidebarMount').innerHTML = buildSidebar('customers');

  function getCustomers() {
    const orders = Orders.all();
    const map = {};
    orders.forEach(o => {
      const email = o.customer?.email || 'unknown';
      if (!map[email]) map[email] = { ...o.customer, orders: [], totalSpent: 0 };
      map[email].orders.push(o);
      map[email].totalSpent += o.total || 0;
    });
    return Object.values(map);
  }

  function renderCustomers() {
    const q = (document.getElementById('searchInput').value||'').toLowerCase();
    let customers = getCustomers();
    if (q) customers = customers.filter(c =>
      (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q)
    );
    const tbody = document.getElementById('customersTable');
    if (customers.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-state">No customers yet. Orders will create customer records automatically.</td></tr>`;
      return;
    }
    tbody.innerHTML = customers.map(c => {
      const lastOrder = c.orders.sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
      return `<tr>
        <td><strong style="font-size:.86rem">${c.name||'—'}</strong></td>
        <td style="font-size:.82rem;color:var(--muted)">${c.email||'—'}</td>
        <td style="font-size:.82rem;color:var(--muted)">${c.phone||'—'}</td>
        <td><span class="badge badge-gray">${c.orders.length}</span></td>
        <td style="color:var(--green);font-family:'Bebas Neue';font-size:1.05rem">${fmt(c.totalSpent)}</td>
        <td style="font-size:.78rem;color:var(--muted)">${lastOrder ? fmtDate(lastOrder.date) : '—'}</td>
        <td><button class="btn-sm btn-secondary" onclick="viewCustomer('${encodeURIComponent(c.email||'')}')">History</button></td>
      </tr>`;
    }).join('');
  }

  function viewCustomer(emailEnc) {
    const email = decodeURIComponent(emailEnc);
    const c = getCustomers().find(x => x.email === email);
    if (!c) return;
    document.getElementById('custModalBody').innerHTML = `
      <div style="margin-bottom:1.2rem">
        <strong style="font-size:1.1rem">${c.name}</strong>
        <div style="font-size:.82rem;color:var(--muted)">${c.email}</div>
        <div style="font-size:.82rem;color:var(--muted)">${c.phone||''}</div>
        <div style="font-size:.82rem;color:var(--muted);margin-top:.2rem">${c.address||''}</div>
      </div>
      <div style="display:flex;gap:2rem;margin-bottom:1.2rem">
        <div><div style="font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)">Orders</div><div style="font-family:'Bebas Neue';font-size:1.8rem">${c.orders.length}</div></div>
        <div><div style="font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)">Total Spent</div><div style="font-family:'Bebas Neue';font-size:1.8rem;color:var(--green)">${fmt(c.totalSpent)}</div></div>
      </div>
      <div style="font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem">Order History</div>
      ${c.orders.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(o=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:1px solid var(--border);font-size:.82rem">
          <div>
            <span style="font-family:'Bebas Neue';color:var(--green)">#${o.id}</span>
            <span style="color:var(--muted);margin-left:.6rem">${fmtDate(o.date)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:.8rem">
            <span>${fmt(o.total)}</span>
            ${statusBadge(o.status)}
          </div>
        </div>`).join('')}`;
    document.getElementById('custModal').classList.add('open');
  }

  renderCustomers();
</script>
</body>
</html>
