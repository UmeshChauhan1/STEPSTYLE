<body>
<nav class="navbar">
  <a class="logo" href="index.html">STEP<span>STYLE</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html" class="active">Shop</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-icons">
    <button class="nav-icon-btn" id="cartToggle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span class="cart-badge">0</span>
    </button>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>
<ul class="mobile-nav" id="mobileNav">
  <li><a href="index.html">Home</a></li>
  <li><a href="shop.html">Shop</a></li>
  <li><a href="contact.html">Contact</a></li>
</ul>

<div class="page">
  <section class="section" style="padding-top:3rem">
    <div class="section-header reveal">
      <div><p class="section-label">All Products</p><h1 class="section-title">Shop</h1></div>
      <span id="resultCount" style="font-size:.8rem;color:var(--gray-light)"></span>
    </div>
    <div class="search-bar reveal">
      <input type="text" id="searchInput" placeholder="Search shoes…" oninput="applyFilters()"/>
      <button onclick="applyFilters()">Search</button>
    </div>
    <div class="filter-pills reveal" id="filterPills"></div>
    <div class="product-grid" id="shopGrid"></div>
    <div id="emptyMsg" style="display:none;text-align:center;padding:4rem;color:var(--gray-light)">
      <p style="font-size:3rem;margin-bottom:1rem">🔍</p>
      <p>No products found. Try a different search or filter.</p>
    </div>
  </section>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header"><h2>Your Cart</h2><button class="close-btn" id="cartClose">&times;</button></div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter"></div>
</div>

<footer>
  <div class="footer-logo">STEP<span>STYLE</span></div>
  <ul class="footer-links">
    <li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li><li><a href="contact.html">Contact</a></li>
  </ul>
  <p class="footer-copy">&copy; 2025 StepStyle. All rights reserved.</p>
</footer>

<script src="js/core.js"></script>
<script src="js/cart-ui.js"></script>
<script>
  let activeFilter = 'All';

  // Build filter pills
  const categories = ['All', ...new Set(Products.all().map(p => p.category))];
  const pillsContainer = document.getElementById('filterPills');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (cat === 'All' ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      activeFilter = cat;
      pillsContainer.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    };
    pillsContainer.appendChild(btn);
  });

  function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let products = Products.all();
    if (activeFilter !== 'All') products = products.filter(p => p.category === activeFilter);
    if (q) products = products.filter(p => p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));

    const grid = document.getElementById('shopGrid');
    const empty = document.getElementById('emptyMsg');
    document.getElementById('resultCount').textContent = products.length + ' products';
    grid.innerHTML = '';

    if (products.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    products.forEach(p => {
      const el = document.createElement('div');
      el.className = 'product-card';
      el.style.cursor = 'pointer';
      el.innerHTML = buildProductCard(p);
      el.querySelector('.card-img').addEventListener('click', () => {
        ga('view_item', { items:[{ item_id:p.id, item_name:p.name }] });
        location.href = 'product.html?id=' + p.id;
      });
      el.querySelector('.card-name').addEventListener('click', () => location.href = 'product.html?id=' + p.id);
      grid.appendChild(el);
    });
  }

  applyFilters();
  initReveal();
</script>
</body>
</html>
